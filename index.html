const KINDS = {
  set:   { label: "セット", color: "#D8B45A", limitMin: null },     // 指名：着席時刻のみ
  quick: { label: "クイック", color: "#5BC8DC", limitMin: 90 },     // 指名：90分
  peer:  { label: "同業", color: "#B07CF0", limitMin: 60 },         // 指名：60分
  nomi2: { label: "2万飲み直し", color: "#D8B45A", limitMin: null },// フリータイム＝着席時刻のみ
  nomi1: { label: "1万飲み直し", color: "#5BC8DC", limitMin: 90 },  // 90分（23時制限なし）
  taiten: { label: "体入", color: "#6FCF97", limitMin: null }, // 体験入店：カウントアップ
};
const QUICK_LAST_ORDER_H = 23;   // クイック提供は23時まで
const QUICK_WARN_BEFORE_MS = 10 * 60 * 1000; // 10分前で赤

// 席の時間状態を返す：{ text, alert }
// セット＝着席時刻のみ。クイック＝90分、同業＝60分カウントダウン（10分前で赤）。
// クイックは 22:50一斉赤 も加わり、90分…ではなく早い方の赤。
const seatTimeState = (now) => (seat) => {
  const k = KINDS[seat.kind] || KINDS.set;
  if (seat.kind === "taiten") {
    // 体入：カウントアップ
    return { text: fmt(now - seat.startedAt), alert: false, countup: true };
  }
  if (!k.limitMin) {
    // セット：着席時刻だけ
    return { text: fmtTime(seat.startedAt), alert: false };
  }
  const rem = k.limitMin * 60 * 1000 - (now - seat.startedAt);
  let alert = rem <= QUICK_WARN_BEFORE_MS; // 残り10分で赤
  if (seat.kind === "quick") {
    const closeWarn = todayAtHour(now, QUICK_LAST_ORDER_H) - QUICK_WARN_BEFORE_MS; // 22:50
    if (now >= closeWarn) alert = true;
  }
  const mins = Math.ceil(rem / 60000);
  const text = rem < 0 ? `${Math.ceil(-rem / 60000)}分超過` : `あと${mins}分`;
  return { text, alert };
};
const SET_MS = 60 * 60 * 1000; // 初回セット1時間
const DAY_CUTOFF_H = 8;        // 朝8時までは前日の営業日として扱う
// 1分〜10分、30秒刻み
const MIN_OPTIONS = Array.from({ length: 19 }, (_, i) => 1 + i * 0.5);
const fmtMin = (m) => (m % 1 === 0 ? `${m}分` : `${Math.floor(m)}分30秒`);
const posLabels = (n) => (n === 1 ? [""] : n === 2 ? ["左", "右"] : ["左", "中", "右"]);

// ─── デザイントークン ───────────────────────────────

const fmt = (ms) => {
  const s = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = String(s % 60).padStart(2, "0");
  return h > 0 ? `${h}:${String(m).padStart(2, "0")}:${ss}` : `${m}:${ss}`;
};
const fmtTime = (ts) => {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
};

// 営業日（朝8時切り替え）
const bizDayStr = (ts) => {
  const d = new Date(ts - DAY_CUTOFF_H * 3600 * 1000);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const dayLabel = (s) => {
  const [y, m, d] = s.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return `${y}/${m}/${d}(${"日月火水木金土"[dt.getDay()]})`;
};
// 指定時刻(now基準)の当日23:00などのタイムスタンプ
const todayAtHour = (now, h) => {
  const d = new Date(now);
  d.setHours(h, 0, 0, 0);
  return d.getTime();
};
const shiftDay = (s, n) => {
  const [y, m, d] = s.split("-").map(Number);
  const dt = new Date(y, m - 1, d + n);
  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
};

// 呼びの色：左＝ピンク／右＝オレンジ／中＝パープル（1人客はピンク）
const POS_COLORS = { "左": "#E84D8A", "右": "#F08C4A", "中": "#B07CF0", "": "#E84D8A" };
const posColor = (pos) => POS_COLORS[pos] ?? POS_COLORS[""];
// 呼びタグ：そのホストが誰の呼びか（配列。例 ["左"], ["左","右"]）
const yobiTagsOf = (girls) => {
  const tags = {};
  girls.forEach((g) =>

};
// 呼びマーク：📸＋色付き左右（ホスト名の横に付ける）
const YobiMark = ({ poses }) => (

);

// 同じ女の子の呼び同士が被らないように
const yobiConflicts = (selectedIds, girls) => {
  const dis = new Set();
  girls.forEach((g) => {
    const ids = g.yobiIds || [];
    const picked = ids.filter((id) => selectedIds.includes(id));
    if (picked.length > 0) {
      ids.forEach((id) => {
        if (!picked.includes(id)) dis.add(id);
      });
    }
  });
  return [...dis];
};

// ホスト選択チップ。tags={id:[pos...]} 呼びを色分け、notes={id:"卓名"|"済"} を小さく表示
const HostChips = ({ list, selected, onToggle, max = 99, tags = {}, disabledIds = [], notes = {}, accent }) => (
  <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
    {list.length === 0 && <div style={{ fontSize: 13, color: C.muted }}>選択できるホストがいません</div>}
    {list.map((h) => {
      const on = selected.includes(h.id);
      const poses = tags[h.id];
      const isYobi = Array.isArray(poses);
      const yColor = isYobi ? posColor(poses[0]) : null;
      const blocked = disabledIds.includes(h.id) && !on;
      const full = !on && selected.length >= max;
      const dead = blocked || full;
      const selColor = accent || yColor || C.gold;
      const selText = accent || yColor || C.goldBright;
      return (
        <button
          key={h.id}
          onClick={() => !dead && onToggle(h.id)}
          style={{
            display: "flex", alignItems: "center", gap: 5,
            borderRadius: 999, padding: "8px 13px", fontSize: 13, fontWeight: 700,

            color: on ? selText : C.text,
            border: `1px solid ${on ? selColor : isYobi ? `${yColor}88` : C.line}`,

        >

            </span>
          )}
        </button>
      );
    })}
  </div>
);

// 集計（エントリ＋必要なら着席中の卓）
const buildStats = (entries, liveSessions, nameOf) => {
  const m = {};
  const bump = (name, key) => {
    if (!name || name === "—") return;
    if (!m[name]) m[name] = { seated: 0, photo: 0, okuri: 0, nomi: 0 };
    m[name][key]++;
  };
  entries.forEach((e) => {
    e.turns.forEach((turn) => turn.names.forEach((n) => bump(n, "seated")));
    e.girls.forEach((g) => {
      g.yobiNames.forEach((n) => bump(n, "photo"));
      if (g.okuriName) bump(g.okuriName, "okuri");
    });
    (e.nomiNames || []).forEach((n) => bump(n, "nomi"));
  });
  (liveSessions || []).forEach((ses) => {
    ses.history.forEach((turn) => turn.hostIds.forEach((id) => bump(nameOf(id), "seated")));
    ses.girls.forEach((g) => (g.yobiIds || []).forEach((id) => bump(nameOf(id), "photo")));
  });
  return Object.entries(m).sort(
    (a, b) => b[1].seated - a[1].seated || b[1].okuri - a[1].okuri || b[1].photo - a[1].photo
  );
};

function TsukemawashiBoard() {
  const [hosts, setHosts] = useState([]);
  const [sessions, setSessions] = useState({});
  const [tableIds, setTableIds] = useState(DEFAULT_TABLES);
  const [defaultMins, setDefaultMins] = useState({ 1: DEFAULT_MIN, 2: DEFAULT_MIN, 3: DEFAULT_MIN });
  const [log, setLog] = useState([]);
  const [tab, setTab] = useState("board");
  const [now, setNow] = useState(Date.now());
  const [loaded, setLoaded] = useState(false);
  const [modal, setModal] = useState(null);
  const [newHostName, setNewHostName] = useState("");
  const [newTableName, setNewTableName] = useState("");
  const [confirmDeleteTable, setConfirmDeleteTable] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const [confirmDeleteLog, setConfirmDeleteLog] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [viewDay, setViewDay] = useState(bizDayStr(Date.now()));
  const [rankMode, setRankMode] = useState("day"); // "day" | "month"
  // 指名卓：{ tableId: { pairs:[{hostId, himeName}], seatedAt } }
  const [shimei, setShimei] = useState({});
  const [editMode, setEditMode] = useState(localStorage.getItem("ty-edit") === "1");
  const readOnly = !editMode;
  const [pinInput, setPinInput] = useState("");
  const tryUnlock = () => {
    if (pinInput === EDIT_PIN) { setEditMode(true); localStorage.setItem("ty-edit", "1"); setPinInput(""); }
  };
  const lock = () => { setEditMode(false); localStorage.removeItem("ty-edit"); };

  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);

  // 画面幅（iPadでは卓カードを複数カラムで一覧表示）
  const [vw, setVw] = useState(typeof window !== "undefined" ? window.innerWidth : 390);
  useEffect(() => {
    const f = () => setVw(window.innerWidth);
    window.addEventListener("resize", f);
    return () => window.removeEventListener("resize", f);
  }, []);
  const boardCols = vw >= 1200 ? 3 : vw >= 768 ? 2 : 1;
  const isWide = vw >= 768;

  const remoteRef = React.useRef(null);
  useEffect(() => {
    const ref = firebase.database().ref(BOARD_PATH);
    const cb = ref.on(
      "value",
      (snap) => {
        const d = snap.val();
        if (d) {
          remoteRef.current = JSON.stringify(d);
          setHosts((d.hosts || []).map((h) => ({ active: true, ...h })));
          setSessions(normalizeSessions(d.sessions || {}));
          setShimei(normalizeShimei(d.shimei || {}));
          setTableIds(d.tableIds && d.tableIds.length ? d.tableIds : DEFAULT_TABLES);
          setDefaultMins({ 1: DEFAULT_MIN, 2: DEFAULT_MIN, 3: DEFAULT_MIN, ...(d.defaultMins || {}) });
          setLog(normalizeLog(d.log || []));
        }
        setLoaded(true);
      },
      (err) => { console.error("接続エラー", err); setLoaded(true); }
    );
    return () => ref.off("value", cb);
  }, []);

  useEffect(() => {
    if (!loaded || readOnly) return;
    const data = { hosts, sessions, shimei, tableIds, defaultMins, log };
    const json = JSON.stringify(data);
    if (json === remoteRef.current) return;
    remoteRef.current = json;
    firebase.database().ref(BOARD_PATH).set(JSON.parse(json))
      .catch((e) => console.error("保存に失敗しました", e));
  }, [hosts, sessions, shimei, tableIds, defaultMins, log, loaded, readOnly]);

  const clampMin = (m) => Math.min(10, Math.max(1, m || DEFAULT_MIN));
  const hostById = (id) => hosts.find((h) => h.id === id);
  const nameOf = (id) => hostById(id)?.name || "—";
  const activeHosts = hosts.filter((h) => h.active);

  const today = bizDayStr(now);
  const dayOf = (e) => e.day || bizDayStr(e.endedAt);
  const todayEntries = log.filter((e) => dayOf(e) === today);
  // 登録ホスト全員を0込みでランキングに載せる（同数はホスト登録順）
  const withEveryone = (arr) => {
    const m = {};
    arr.forEach(([n, s]) => { m[n] = s; });
    hosts.forEach((h) => { if (!m[h.name]) m[h.name] = { seated: 0, photo: 0, okuri: 0 }; });
    const idx = (n) => {
      const i = hosts.findIndex((h) => h.name === n);
      return i < 0 ? 999 : i;
    };
    return Object.entries(m).sort(
      (a, b) =>
        b[1].seated - a[1].seated ||
        b[1].okuri - a[1].okuri ||
        b[1].photo - a[1].photo ||
        idx(a[0]) - idx(b[0])
    );
  };
  const todayStats = withEveryone(buildStats(todayEntries, Object.values(sessions), nameOf));
  const seatedCountOf = (h) => {
    const row = todayStats.find(([name]) => name === h.name);
    return row ? row[1].seated : 0;
  };

  // 待機列・選択候補：本日着いた数が少ない順 → 同数はホスト登録の並び順
  const pickable = activeHosts
    .filter((h) => h.status === "waiting")
    .sort((a, b) => {
      const d = seatedCountOf(a) - seatedCountOf(b);
      if (d !== 0) return d;
      return hosts.findIndex((x) => x.id === a.id) - hosts.findIndex((x) => x.id === b.id);
    });
  const waiting = pickable;

  // ─── ホスト管理 ───
  const addHost = () => {
    const name = newHostName.trim();
    if (!name) return;
    setHosts((hs) => [...hs, { id: uid(), name, status: "waiting", waitSince: Date.now(), active: true }]);
    setNewHostName("");
  };
  const removeHost = (id) => setHosts((hs) => hs.filter((h) => h.id !== id));
  const moveHost = (id, dir) =>
    setHosts((hs) => {
      const i = hs.findIndex((h) => h.id === id);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= hs.length) return hs;
      const n = [...hs];
      [n[i], n[j]] = [n[j], n[i]];
      return n;
    });
  const toggleActive = (id) =>
    setHosts((hs) =>
      hs.map((h) => {
        if (h.id !== id) return h;
        if (h.status === "seated") return h;
        return { ...h, active: !h.active, waitSince: Date.now() };
      })
    );

  // ─── 指名卓の操作 ───
  // 指名の他卓引き抜き（初回・指名どちらからでも外す）
  const detachEverywhere = (ids, t) => {
    setSessions((s) => {
      const out = {};
      Object.entries(s).forEach(([tid, se]) => {
        if (se.hostIds.some((id) => ids.includes(id))) {
          const kept = se.hostIds.filter((id) => !ids.includes(id));
          out[tid] = { ...se, hostIds: kept, ...(kept.length === 0 ? { emptySince: t } : {}) };
        } else out[tid] = se;
      });
      return out;
    });
    setShimei((s) => {
      const out = {};
      Object.entries(s).forEach(([tid, se]) => {
        if (se.reserved) { out[tid] = se; return; }
        const kept = se.seats.filter((st) => !ids.includes(st.hostId));
        if (kept.length !== se.seats.length) {
          if (kept.length > 0) out[tid] = { ...se, seats: kept };
          // 空になった指名卓は消す
        } else out[tid] = se;
      });
      return out;
    });
  };

  // 指名：担当を選んでも待機状態や他卓には一切影響させない（誰の卓かの記録だけ）
  // 予約卓を作る（時間なし・担当/名前は任意）
  const reserveShimei = (tableId, { hostId, name }) => {
    setShimei((s) => ({ ...s, [tableId]: { reserved: true, memo: { hostId: hostId || null, name: (name || "").trim() } } }));
    setModal(null);
  };
  const editReserve = (tableId, { hostId, name }) => {
    setShimei((s) => (s[tableId] ? { ...s, [tableId]: { reserved: true, memo: { hostId: hostId || null, name: (name || "").trim() } } } : s));
    setModal(null);
  };
  const cancelReserve = (tableId) => {
    setShimei((s) => { const n = { ...s }; delete n[tableId]; return n; });
    setModal(null);
  };
  // 予約→指名で着席に変換（予約を消して着席フォームへ）
  const reserveToSeat = (tableId) => {
    setModal({ type: "shimeiSeat", tableId, fromReserve: true });
  };

  const seatShimei = (tableId, seats) => {
    const t = Date.now();
    setShimei((s) => ({
      ...s,
      [tableId]: { seats: seats.map((x) => ({ ...x, startedAt: t })) },
    }));
    setModal(null);
  };
  const addShimeiSeats = (tableId, seats) => {
    const t = Date.now();
    setShimei((s) => ({
      ...s,
      [tableId]: { seats: [...(s[tableId]?.seats || []), ...seats.map((x) => ({ ...x, startedAt: t }))] },
    }));
    setModal({ type: "shimeiDetail", tableId });
  };
  // 席区分の変更（クイック→セット等）。セットにするとカウントアップ
  const setSeatHime = (tableId, idx, himeName) =>
    setShimei((s) => {
      if (!s[tableId]) return s;
      const seats = s[tableId].seats.map((st, i) => (i === idx ? { ...st, himeName } : st));
      return { ...s, [tableId]: { ...s[tableId], seats } };
    });
  const setSeatKind = (tableId, idx, kind) =>
    setShimei((s) => {
      if (!s[tableId]) return s;
      const seats = s[tableId].seats.map((st, i) =>
        i === idx ? { ...st, kind, startedAt: Date.now() } : st
      );
      return { ...s, [tableId]: { ...s[tableId], seats } };
    });
  const moveShimei = (fromId, toId) => {
    setShimei((s) => {
      if (!s[fromId] || s[toId]) return s;
      const n = { ...s };
      n[toId] = n[fromId];       // 時間継続（各seatのstartedAtそのまま）
      delete n[fromId];
      return n;
    });
    setModal({ type: "shimeiDetail", tableId: toId });
  };
  const endShimei = (tableId) => {
    setShimei((s) => {
      const n = { ...s };
      delete n[tableId];
      return n;
    });
    setModal(null);
  };

  // ─── 卓の追加・削除 ───
  const addTable = () => {
    const name = newTableName.trim().toUpperCase();
    if (!name || tableIds.includes(name)) return;
    setTableIds((ts) => [...ts, name]);
    setNewTableName("");
  };
  const removeTable = (tid) => {
    if (sessions[tid]) return; // 使用中は削除不可
    setTableIds((ts) => ts.filter((t) => t !== tid));
    setConfirmDeleteTable(null);
  };
  const moveTable = (tid, dir) =>
    setTableIds((ts) => {
      const i = ts.indexOf(tid);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= ts.length) return ts;
      const n = [...ts];
      [n[i], n[j]] = [n[j], n[i]];
      return n;
    });

  // ─── 卓操作 ───
  // 引き抜き：1人でも抜かれた卓は残りのホストも全員待機へ戻り、卓は無人になる
  // （2人セットで動く運用のため。代わりに誰かが補うことはしない）
  const pullFromOthers = (s, tableId, ids, t) => {
    const out = {};
    const displaced = [];
    Object.entries(s).forEach(([t2, se]) => {
      if (t2 === tableId) { out[t2] = se; return; }
      if (se.hostIds.some((id) => ids.includes(id))) {
        se.hostIds.forEach((id) => { if (!ids.includes(id)) displaced.push(id); });
        out[t2] = { ...se, hostIds: [], emptySince: t };
      } else {
        out[t2] = se;
      }
    });
    return { out, displaced };
  };

  const seat = (tableId, { girls, hostIds, rotateMin }) => {
    const t = Date.now();
    const { out, displaced } = pullFromOthers(sessions, tableId, hostIds, t);
    setSessions({
      ...out,
      [tableId]: {
        girls, hostIds,
        history: hostIds.length > 0 ? [{ hostIds, at: t }] : [],
        seatedAt: t, startedAt: t,
        rotateMin: clampMin(rotateMin),
        reserved: [],
        ...(hostIds.length === 0 ? { emptySince: t } : {}),
      },
    });
    setHosts((hs) =>
      hs.map((h) => {
        if (hostIds.includes(h.id)) return { ...h, status: "seated" };
        if (displaced.includes(h.id)) return { ...h, status: "waiting", waitSince: t };
        return h;
      })
    );
    setModal(null);
  };

  const rotate = (tableId, newIds) => {
    const ses = sessions[tableId];
    if (!ses) return;
    const t = Date.now();
    const { out, displaced } = pullFromOthers(sessions, tableId, newIds, t);
    setHosts((hs) =>
      hs.map((h) => {
        if (newIds.includes(h.id)) return { ...h, status: "seated" };
        if (ses.hostIds.includes(h.id) || displaced.includes(h.id)) {
          return { ...h, status: "waiting", waitSince: t };
        }
        return h;
      })
    );
    setSessions({
      ...out,
      [tableId]: {
        ...ses,
        hostIds: newIds,
        history: [...ses.history, { hostIds: newIds, at: t }],
        seatedAt: t,
        emptySince: undefined,
        reserved: (ses.reserved || []).slice(1),
      },
    });
    setModal(null);
  };

  // 取消：間違えて開けた卓を履歴に残さず消す。ホストは待機へ
  const cancelTable = (tableId) => {
    const ses = sessions[tableId];
    if (!ses) return;
    const t = Date.now();
    setHosts((hs) =>
      hs.map((h) => (ses.hostIds.includes(h.id) ? { ...h, status: "waiting", waitSince: t } : h))
    );
    setSessions((s) => {
      const n = { ...s };
      delete n[tableId];
      return n;
    });
    setModal(null);
  };

  // 抜く：ホスト全員を待機に戻して卓を無人にする（お客様は残る）
  const pullAll = (tableId) => {
    const ses = sessions[tableId];
    if (!ses || ses.hostIds.length === 0) return;
    const t = Date.now();
    setHosts((hs) =>
      hs.map((h) => (ses.hostIds.includes(h.id) ? { ...h, status: "waiting", waitSince: t } : h))
    );
    setSessions((s) => ({
      ...s,
      [tableId]: { ...s[tableId], hostIds: [], emptySince: t },
    }));
    setModal(null);
  };

  const setTableRotateMin = (tableId, m) =>
    setSessions((s) =>
      s[tableId] ? { ...s, [tableId]: { ...s[tableId], rotateMin: clampMin(m) } } : s
    );

  const setReserved = (tableId, reserved) => {
    setSessions((s) =>
      s[tableId] ? { ...s, [tableId]: { ...s[tableId], reserved } } : s
    );
    setModal({ type: "detail", tableId });
  };

  // このホストがどこかの卓の予定に入っているか（約何分後かも逆算）
  const reserveNotesOf = (hid) => {
    const notes = [];
    Object.entries(sessions).forEach(([tid, se]) => {
      const r = se.reserved || [];
      const limit = clampMin(se.rotateMin) * 60 * 1000;
      const rem = limit - (now - se.seatedAt);
      const eta = (ms) => {
        const m = Math.ceil(ms / 60000);
        return m <= 0 ? "まもなく" : `約${m}分後`;
      };
      if ((r[0] || []).includes(hid)) notes.push(`${eta(rem)} 次 ${tid}`);
      if ((r[1] || []).includes(hid)) notes.push(`${eta(rem + limit)} 次の次 ${tid}`);
    });
    return notes;
  };

  const removeLogEntry = (id) => {
    setLog((l) => l.filter((e) => e.id !== id));
    setConfirmDeleteLog(null);
  };

  // 履歴に記録して初回卓を閉じる（共通処理）
  const logAndCloseInitial = (tableId, okuriIds, t, nomiNames) => {
    const ses = sessions[tableId];
    if (!ses) return;
    const entry = {
      id: uid(),
      tableId,
      day: bizDayStr(t),
      startedAt: ses.startedAt,
      endedAt: t,
      turns: ses.history.map((turn) => ({ names: turn.hostIds.map(nameOf), at: turn.at })),
      girls: ses.girls.map((g, i) => ({
        pos: g.pos, name: g.name,
        yobiNames: (g.yobiIds || []).map(nameOf),
        okuriName: okuriIds[i] ? nameOf(okuriIds[i]) : null,
      })),
      nomiNames: nomiNames || [],
    };
    setLog((l) => [entry, ...l]);
    setHosts((hs) =>
      hs.map((h) => (ses.hostIds.includes(h.id) ? { ...h, status: "waiting", waitSince: t } : h))
    );
    setSessions((s) => { const n = { ...s }; delete n[tableId]; return n; });
  };

  // 送りだけ決める：カウントアップ開始（回転タイマーは止まる）
  const decideOkuri = (tableId, okuriIds) => {
    const t = Date.now();
    setSessions((s) =>
      s[tableId] ? { ...s, [tableId]: { ...s[tableId], okuriDecided: okuriIds, okuriSince: t } } : s
    );
    setModal(null);
  };
  // 送り取り消し（初回に戻す）
  const undoOkuri = (tableId) => {
    setSessions((s) => {
      if (!s[tableId]) return s;
      const n = { ...s[tableId] };
      delete n.okuriDecided; delete n.okuriSince;
      // 回転タイマーは止めていた分を考慮せずリセット（シンプルに今から）
      return { ...s, [tableId]: { ...n, seatedAt: Date.now() } };
    });
  };
  // 会計（送り決定後、初回卓を閉じる）
  const checkout = (tableId) => {
    const ses = sessions[tableId];
    if (!ses) return;
    logAndCloseInitial(tableId, ses.okuriDecided || ses.girls.map(() => null), Date.now());
    setModal(null);
  };

  // 飲み直し（指名へ）：送りの子がそのまま担当。seats=[{hostId,himeName,kind}]
  const nominaoshi = (fromTableId, toTableId, seats) => {
    const ses = sessions[fromTableId];
    if (!ses) return;
    const t = Date.now();
    logAndCloseInitial(fromTableId, ses.okuriDecided || ses.girls.map(() => null), t, seats.map((x) => nameOf(x.hostId)));
    setShimei((s) => ({
      ...s,
      [toTableId]: { seats: seats.map((x) => ({ ...x, startedAt: t })) },
    }));
    setTab("shimei");
    setModal(null);
  };

  const clock = new Date(now);
  const hh = String(clock.getHours()).padStart(2, "0");
  const mi = String(clock.getMinutes()).padStart(2, "0");
  const occupiedCount = Object.keys(sessions).length;

  // 履歴タブ用：表示日のデータ
  const viewEntries = log.filter((e) => dayOf(e) === viewDay);
  const viewMonth = viewDay.slice(0, 7);
  const monthEntries = log.filter((e) => dayOf(e).startsWith(viewMonth));
  const liveForView =
    rankMode === "day"
      ? viewDay === today ? Object.values(sessions) : []
      : today.startsWith(viewMonth) ? Object.values(sessions) : [];
  const viewStats = withEveryone(buildStats(rankMode === "day" ? viewEntries : monthEntries, liveForView, nameOf));

  // そのホストが今ついている卓数（初回＋指名）
  const hostTableCount = (hid) => {
    let n = 0;
    Object.values(sessions).forEach((se) => { if (se.hostIds.includes(hid)) n++; });
    Object.values(shimei).forEach((se) => { if (!se.reserved && (se.seats||[]).some((s) => s.hostId === hid)) n++; });
    return n;
  };
  const shimeiTables = tableIds.filter((t) => shimei[t]);
  // タブのアラート判定
  const boardAlert = Object.values(sessions).some((se) => {
    const empty = se.hostIds.length === 0;
    const over = (now - se.seatedAt) >= clampMin(se.rotateMin) * 60 * 1000;
    return empty || over;
  });
  const shimeiAlert = (() => {
    const st = seatTimeState(now);
    return Object.values(shimei).some((se) => !se.reserved && (se.seats || []).some((x) => st(x).alert));
  })();
  const occupiedTables = tableIds.filter((t) => sessions[t]);

  // どのホストがどの卓に着いているか
  const seatMap = {};
  Object.entries(sessions).forEach(([t, ses]) => ses.hostIds.forEach((id) => { seatMap[id] = t; }));
  // 選択チップ用：待機（優先順）→ 着席中（グレー表示）の順
  const pickerHosts = [...pickable, ...activeHosts.filter((h) => h.status === "seated")];
  const emptyTables = tableIds.filter((t) => !sessions[t] && !shimei[t]);

  // 卓カード描画（使用中のみ・横幅いっぱい）
  const renderTableCard = (tid) => {
    const ses = sessions[tid];
    if (!ses) return null;
    const waitingOkuri = !!ses.okuriDecided;   // 送り決定済み＝カウントアップ中
    const limit = clampMin(ses.rotateMin) * 60 * 1000;
    const rotRem = limit - (now - ses.seatedAt);
    const over = !waitingOkuri && rotRem < 0;
    const ratio = Math.min(1, (now - ses.seatedAt) / limit);
    const turn = ses.history.length;
    const setRem = SET_MS - (now - ses.startedAt);
    const tags = yobiTagsOf(ses.girls);
    const next = (ses.reserved || [])[0];
    const next2 = (ses.reserved || [])[1];
    const empty = !waitingOkuri && ses.hostIds.length === 0;
    const alert = over || empty;
    const visited = ses.history.flatMap((t) => t.hostIds);

    const hostRow = (label, ids) => (
      <div key={label} style={{ display: "flex", flexWrap: "wrap", gap: "2px 8px", alignItems: "baseline" }}>
        <span style={{ color: C.muted, fontSize: 12, fontWeight: 700, width: 54, flexShrink: 0 }}>{label}</span>
        {ids.length === 0 && label === "現在▸" && (
          <span style={{ fontSize: 13, fontWeight: 700, color: C.red }}>なし</span>
        )}
        {ids.map((id) => (
          <span key={id} style={{ fontSize: 13, fontWeight: 700, color: C.text }}>
            {tags[id] && <YobiMark poses={tags[id]} />}
            {nameOf(id)}
          </span>
        ))}
      </div>
    );

    return (
      <button
        key={tid}
        onClick={() => setModal({ type: "detail", tableId: tid })}
        style={{
          width: "100%",
          background: alert ? C.redBg : C.surface,
          border: alert ? `2px solid ${C.red}` : waitingOkuri ? `1px solid ${C.cyan}66` : `1px solid ${C.gold}55`,
          animation: alert ? "alertPulse 1.2s ease-in-out infinite" : "none",
          borderRadius: 10, padding: "12px 12px 10px",
          cursor: "pointer", textAlign: "left",
          display: "flex", flexDirection: "column", gap: 7,
          fontFamily: "'Zen Kaku Gothic New', sans-serif",
          transition: "border-color 0.4s, background 0.4s",
        }}
      >
        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
          <span style={{ display: "flex", alignItems: "baseline", gap: 8, minWidth: 0 }}>

          <>
            <div style={{ display: "grid", gridTemplateColumns: `repeat(${ses.girls.length}, 1fr)`, gap: 8 }}>

                return (
                  <div key={i} style={{ minWidth: 0 }}>

                    {ys.length > 0 && (
                      <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
                        <span style={{ fontSize: 10, color: C.muted, fontWeight: 700 }}>呼び</span>
                        <span style={{ color: posColor(g.pos || ""), fontSize: 12, fontWeight: 700 }}>
                          {ys.map((id, k) => (
                            <span key={id} style={{ textDecoration: visited.includes(id) ? "line-through" : "none", opacity: visited.includes(id) ? 0.55 : 1 }}>

                            </span>
                          ))}
                        </span>
                      </div>
                    )}
                  </div>

              })}
            </div>

            {hostRow("現在▸", ses.hostIds)}
            {next && next.length > 0 && hostRow("次▸", next)}

        {!waitingOkuri && (
          <div style={{ height: 3, background: C.surface2, borderRadius: 2, overflow: "hidden", marginTop: "auto" }}>
            <div style={{ height: "100%", width: `${ratio * 100}%`, background: alert ? C.red : `linear-gradient(90deg, ${C.gold}, ${C.goldBright})`, transition: "width 1s linear" }} />
          </div>

      </button>
    );
  };

  return (
    <div
      style={{
        minHeight: "100vh", background: C.bg, color: C.text,
        fontFamily: "'Zen Kaku Gothic New', sans-serif", paddingBottom: 96,

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

      {((boardAlert && tab !== "board") || (shimeiAlert && tab !== "shimei")) && (

            padding: "10px 16px", fontFamily: "'Zen Kaku Gothic New', sans-serif",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8,

        </button>

                      fontFamily: "'Zen Kaku Gothic New', sans-serif",

                  >
                    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
                      <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 19, fontWeight: 600, color: C.text }}>{tid}</span>
                      <span style={{ fontSize: 11, color: ses.seats.every((s)=>s.kind==="taiten") ? KINDS.taiten.color : C.pink, fontWeight: 700 }}>

                      </span>

            return (
              <>
                {shimeiTables.length > 0 && (

              onClick={() => setViewDay(shiftDay(viewDay, -1))}
              style={{
                background: C.surface, border: `1px solid ${C.line}`, borderRadius: 8,

          {/* 日別/月間 切替 */}
          <div style={{ display: "flex", gap: 0, marginBottom: 10, border: `1px solid ${C.line}`, borderRadius: 8, overflow: "hidden" }}>
            {[
              { id: "day", label: `${Number(viewDay.slice(8))}日のランキング` },
              { id: "month", label: `${Number(viewMonth.slice(5))}月のランキング` },

                style={{

                  <span>ホスト{rankMode === "day" && viewDay === today ? "（着席中含む）" : ""}</span>

                >

                    <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 18, fontWeight: 600, color: C.goldBright }}>
                      {e.tableId}
                    </span>
                    <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 13, color: C.muted }}>
                      {fmtTime(e.startedAt)}–{fmtTime(e.endedAt)}（{fmt(e.endedAt - e.startedAt)}・⟳{e.turns.length}）
                    </span>
                    {!readOnly && (<span style={{ marginLeft: "auto", flexShrink: 0 }}>
                      {confirmDeleteLog === e.id ? (
                        <span style={{ display: "inline-flex", gap: 6 }}>
                          <button
                            onClick={() => removeLogEntry(e.id)}
                            style={{
                              background: `${C.red}1A`, border: `1px solid ${C.red}`, borderRadius: 6,
                              color: C.red, fontSize: 11, fontWeight: 700, padding: "4px 8px", cursor: "pointer",
                              fontFamily: "'Zen Kaku Gothic New', sans-serif",
                            }}
                          >
                            削除
                          </button>
                          <button
                            onClick={() => setConfirmDeleteLog(null)}
                            style={{
                              background: "none", border: `1px solid ${C.line}`, borderRadius: 6,

                              fontFamily: "'Zen Kaku Gothic New', sans-serif",

                            やめる
                          </button>
                        </span>
                      ) : (
                        <button
                          onClick={() => setConfirmDeleteLog(e.id)}
                          style={{ background: "none", border: "none", color: C.muted, fontSize: 14, cursor: "pointer" }}
                          aria-label="この履歴を削除"
                        >
                          ✕
                        </button>
                      )}
                    </span>)}
                  </div>

                  {e.girls.map((g, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12, fontWeight: 700, marginBottom: 3, flexWrap: "wrap" }}>
                      <PosBadge pos={g.pos} small />
                      <span style={{ color: C.cyan }}>{g.name || "お客様"}</span>
                      {g.yobiNames.length > 0 && (
                        <span style={{ color: posColor(g.pos || ""), fontSize: 11 }}>呼び {g.yobiNames.join("・")}</span>
                      )}
                      <span style={{ fontSize: 11, marginLeft: "auto" }}>
                        <span style={{ color: C.muted }}>送り：</span>
                        {g.okuriName ? (
                          <span style={{ color: C.goldBright }}>{g.okuriName}</span>
                        ) : (
                          <span style={{ color: C.muted }}>なし</span>
                        )}
                      </span>
                    </div>
                  ))}

                  <div style={{ fontSize: 11, color: C.text, lineHeight: 1.8, marginTop: 4 }}>
                    <span style={{ color: C.muted }}>着いた順：</span>
                    {e.turns.map((turn, j) => (
                      <span key={j}>
                        {j > 0 && <span style={{ color: C.muted }}> → </span>}
                        <span style={{ color: C.muted, fontFamily: "Oswald, sans-serif", fontSize: 10 }}>{j + 1}.</span>
                        {turn.names.join("・")}
                        <span style={{ color: C.muted, fontFamily: "Oswald, sans-serif", fontSize: 10 }}> {fmtTime(turn.at)}</span>
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {log.length > 0 && (
            <div style={{ marginTop: 20 }}>
              {confirmClear ? (
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn kind="danger" onClick={() => { setLog([]); setConfirmClear(false); }} style={{ flex: 1 }}>
                    本当に全消去する
                  </Btn>
                  <Btn onClick={() => setConfirmClear(false)} style={{ flex: 1 }}>やめる</Btn>
                </div>
              ) : (
                <Btn kind="danger" onClick={() => setConfirmClear(true)} style={{ width: "100%" }}>
                  全履歴を消去（全日分が消えます）
                </Btn>
              )}
            </div>
          )}
        </main>
      )}

      {/* ───────── 設定タブ ───────── */}
      {tab === "hosts" && (
        <main style={{ padding: 16, maxWidth: 760, margin: "0 auto", width: "100%" }}>
          <div style={{ border: `1px solid ${readOnly ? C.line : C.gold}66`, borderRadius: 10, padding: "12px", marginBottom: 20, background: C.surface }}>
            {readOnly ? (
              <>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>閲覧モード（見るだけ・操作不可）</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <input type="password" inputMode="numeric" value={pinInput} onChange={(e) => setPinInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && tryUnlock()} placeholder="操作用PINを入力" style={{ ...inputStyle, flex: 1 }} />
                  <Btn kind="gold" onClick={tryUnlock}>解除</Btn>
                </div>
                {pinInput.length >= EDIT_PIN.length && pinInput !== EDIT_PIN && (<div style={{ fontSize: 11, color: C.red, marginTop: 6 }}>PINが違います</div>)}
              </>
            ) : (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.goldBright }}>操作モード（編集できます）</div>
                <Btn onClick={lock} style={{ padding: "8px 12px", fontSize: 12 }}>閲覧に戻す</Btn>
              </div>
            )}
          </div>

          {!readOnly && (<>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>ホスト登録</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            <input
              value={newHostName}
              onChange={(e) => setNewHostName(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && addHost()}
              placeholder="ホスト名を入力"
              style={{ ...inputStyle, flex: 1, background: C.surface }}
            />
            <Btn kind="gold" onClick={addHost}>登録</Btn>
          </div>

          {hosts.length === 0 ? (
            <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "30px 0" }}>
              ホストが未登録です。名前を入力して登録してください。
            </div>
          ) : (
            <>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 8 }}>
                ▲▼で並び替え（待機列の優先順位になります）／スイッチで出勤・休みを切替
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {hosts.map((h, idx) => {
                  const tid = Object.keys(sessions).find((k) => sessions[k].hostIds.includes(h.id));
                  return (
                    <div
                      key={h.id}
                      style={{
                        display: "flex", alignItems: "center", gap: 8,
                        background: C.surface, border: `1px solid ${C.line}`,
                        borderRadius: 10, padding: "10px 12px",
                        opacity: h.active ? 1 : 0.45,
                      }}
                    >
                      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                        <button
                          onClick={() => moveHost(h.id, -1)}
                          disabled={idx === 0}
                          style={{
                            background: "none", border: `1px solid ${C.line}`, borderRadius: 5,
                            color: idx === 0 ? `${C.muted}55` : C.muted,
                            fontSize: 10, padding: "1px 7px", cursor: "pointer",
                          }}
                          aria-label="上へ"
                        >
                          ▲
                        </button>
                        <button
                          onClick={() => moveHost(h.id, 1)}
                          disabled={idx === hosts.length - 1}
                          style={{
                            background: "none", border: `1px solid ${C.line}`, borderRadius: 5,
                            color: idx === hosts.length - 1 ? `${C.muted}55` : C.muted,
                            fontSize: 10, padding: "1px 7px", cursor: "pointer",
                          }}
                          aria-label="下へ"
                        >
                          ▼
                        </button>
                      </div>

                      <div style={{ fontWeight: 700, fontSize: 15, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {h.name}
                      </div>

                      {reserveNotesOf(h.id).length > 0 && (
                        <div style={{ marginLeft: "auto", fontSize: 10, color: C.gold, fontWeight: 700, flexShrink: 0, textAlign: "right", lineHeight: 1.4 }}>
                          {reserveNotesOf(h.id).map((n, k) => (
                            <div key={k}>{n}</div>
                          ))}
                        </div>
                      )}

                      <div style={{ marginLeft: reserveNotesOf(h.id).length > 0 ? 0 : "auto", fontSize: 11, color: tid ? C.goldBright : C.muted, flexShrink: 0 }}>
                        {tid ? `${tid} 着席中` : h.active ? "出勤" : "休み"}
                      </div>

                      <Toggle on={h.active} onChange={() => toggleActive(h.id)} disabled={!!tid} />

                      {!tid && (confirmDelete === h.id ? (
                        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                          <button
                            onClick={() => { removeHost(h.id); setConfirmDelete(null); }}
                            style={{
                              background: `${C.red}1A`, border: `1px solid ${C.red}`, borderRadius: 6,
                              color: C.red, fontSize: 11, fontWeight: 700, padding: "5px 9px", cursor: "pointer",
                              fontFamily: "'Zen Kaku Gothic New', sans-serif",
                            }}
                          >
                            削除する
                          </button>
                          <button
                            onClick={() => setConfirmDelete(null)}
                            style={{
                              background: "none", border: `1px solid ${C.line}`, borderRadius: 6,
                              color: C.muted, fontSize: 11, fontWeight: 700, padding: "5px 9px", cursor: "pointer",
                              fontFamily: "'Zen Kaku Gothic New', sans-serif",
                            }}
                          >
                            やめる
                          </button>
                        </div>
                      ) : (
                        <button
                          onClick={() => setConfirmDelete(h.id)}
                          style={{ background: "none", border: "none", color: C.muted, fontSize: 16, cursor: "pointer", flexShrink: 0 }}
                          aria-label={`${h.name}を削除`}
                        >
                          ✕
                        </button>
                      ))}
                    </div>
                  );
                })}
              </div>
            </>
          )}

          <div style={{ marginTop: 26, borderTop: `1px solid ${C.line}`, paddingTop: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>卓の管理</div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>
              ▲▼で並び替え。✕→「削除?」の2回タップで削除（使用中の卓は削除できません）
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
              {tableIds.map((tid, idx) => {
                const inUse = !!sessions[tid];
                const pending = confirmDeleteTable === tid;
                return (
                  <div
                    key={tid}
                    style={{
                      display: "flex", alignItems: "center", gap: 8,
                      background: pending ? `${C.red}12` : C.surface,
                      border: `1px solid ${pending ? C.red : C.line}`,
                      borderRadius: 8, padding: "6px 10px",

                  >
                    <div style={{ display: "flex", gap: 4 }}>
                      <button
                        onClick={() => moveTable(tid, -1)}
                        disabled={idx === 0}
                        style={{
                          background: "none", border: `1px solid ${C.line}`, borderRadius: 5,
                          color: idx === 0 ? `${C.muted}55` : C.muted,
                          fontSize: 10, padding: "3px 8px", cursor: "pointer",
                        }}
                        aria-label="上へ"
                      >
                        ▲
                      </button>
                      <button
                        onClick={() => moveTable(tid, 1)}
                        disabled={idx === tableIds.length - 1}
                        style={{
                          background: "none", border: `1px solid ${C.line}`, borderRadius: 5,
                          color: idx === tableIds.length - 1 ? `${C.muted}55` : C.muted,
                          fontSize: 10, padding: "3px 8px", cursor: "pointer",
                        }}
                        aria-label="下へ"
                      >
                        ▼
                      </button>
                    </div>
                    <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 15, fontWeight: 600 }}>{tid}</span>
                    <span style={{ marginLeft: "auto" }}>
                      {inUse ? (
                        <span style={{ fontSize: 10, color: C.goldBright }}>使用中</span>
                      ) : (
                        <button
                          onClick={() => (pending ? removeTable(tid) : setConfirmDeleteTable(tid))}
                          style={{
                            background: "none", border: "none",
                            color: pending ? C.red : C.muted,
                            fontSize: pending ? 11 : 14, fontWeight: 700, cursor: "pointer", padding: 0,
                            fontFamily: "'Zen Kaku Gothic New', sans-serif",
                          }}
                        >
                          {pending ? "削除?" : "✕"}
                        </button>
                      )}
                    </span>
                  </div>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <input
                value={newTableName}
                onChange={(e) => setNewTableName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addTable()}
                placeholder="卓名を入力（例：F1）"
                style={{ ...inputStyle, flex: 1, background: C.surface }}
              />
              <Btn kind="gold" onClick={addTable}>追加</Btn>
            </div>
          </div>

          <div style={{ marginTop: 26, borderTop: `1px solid ${C.line}`, paddingTop: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>回転時間のデフォルト（人数別）</div>
            <div style={{ fontSize: 11, color: C.muted, margin: "2px 0 12px" }}>
              着席時に卓ごとに変更できます。超過した卓は赤く点灯
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {[1, 2, 3].map((n) => (
                <div
                  key={n}
                  style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    background: C.surface, border: `1px solid ${C.line}`,
                    borderRadius: 8, padding: "10px 12px",
                  }}
                >
                  <span style={{ fontSize: 13, fontWeight: 700 }}>{n}名初回のとき</span>
                  <select
                    value={clampMin(defaultMins[n])}
                    onChange={(e) => setDefaultMins((d) => ({ ...d, [n]: Number(e.target.value) }))}
                    style={selectStyle}
                  >
                    {MIN_OPTIONS.map((m) => (
                      <option key={m} value={m}>{fmtMin(m)}</option>
                    ))}
                  </select>
                </div>
              ))}
            </div>
          </div>
          </>)}
        </main>
      )}

      {/* タブバー */}
      <nav
        style={{
          position: "fixed", bottom: 0, left: 0, right: 0,
          display: "flex", borderTop: `1px solid ${C.line}`,
          background: `${C.bg}F5`, backdropFilter: "blur(10px)", zIndex: 10,
        }}
      >
        {[
          { id: "board", label: "初回", sub: `${occupiedCount}卓` },
          { id: "shimei", label: "指名", sub: `${shimeiTables.length}卓` },
          { id: "log", label: "履歴", sub: `${todayEntries.length}件` },
          { id: "hosts", label: "設定", sub: `${activeHosts.length}名出勤` },
        ].map((t) => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              flex: 1, padding: "10px 0 14px", background: "none", border: "none",
              color: tab === t.id ? C.goldBright : C.muted, cursor: "pointer",
              borderTop: `2px solid ${tab === t.id ? C.gold : "transparent"}`,
              fontFamily: "'Zen Kaku Gothic New', sans-serif",
            }}
          >
            <div style={{ fontSize: 15, fontWeight: 700, position: "relative", display: "inline-block" }}>
              {t.label}

            </div>
            <div style={{ fontSize: 10, letterSpacing: "0.1em" }}>{t.sub}</div>
          </button>
        ))}
      </nav>

      {modal && (
        <Sheet onClose={() => setModal(null)}>
          {modal.type === "seat" && (
            <SeatForm
              tableId={modal.tableId}
              defaultMins={defaultMins}
              clampMin={clampMin}
              hosts={activeHosts}
              pickerHosts={pickerHosts}
              seatMap={seatMap}
              onSubmit={(data) => seat(modal.tableId, data)}
            />
          )}
          {modal.type === "detail" && sessions[modal.tableId] && (
            <DetailSheet
              tableId={modal.tableId}
              ses={sessions[modal.tableId]}
              readOnly={readOnly}
              clampMin={clampMin}
              setTableRotateMin={setTableRotateMin}
              hostById={hostById}
              now={now}
              onRotate={() => setModal({ type: "rotate", tableId: modal.tableId })}
              onReserve={() => setModal({ type: "reserve", tableId: modal.tableId })}
              onPull={() => pullAll(modal.tableId)}
              onCancel={() => cancelTable(modal.tableId)}
              onSelectOkuri={() => setModal({ type: "okuri", tableId: modal.tableId })}
              onUndoOkuri={() => { undoOkuri(modal.tableId); }}
              onPay={() => checkout(modal.tableId)}
              onNominaoshi={() => setModal({ type: "nominaoshi", tableId: modal.tableId })}
            />
          )}
          {modal.type === "rotate" && sessions[modal.tableId] && (
            <RotateForm
              tableId={modal.tableId}
              ses={sessions[modal.tableId]}
              pickerHosts={pickerHosts}
              seatMap={seatMap}
              hostById={hostById}
              onSubmit={(ids) => rotate(modal.tableId, ids)}
            />
          )}
          {modal.type === "reserve" && sessions[modal.tableId] && (
            <ReserveForm
              tableId={modal.tableId}
              ses={sessions[modal.tableId]}
              hosts={activeHosts}
              seatMap={seatMap}
              hostById={hostById}
              onSubmit={(reserved) => setReserved(modal.tableId, reserved)}
            />
          )}
          {modal.type === "shimeiSeat" && (
            <ShimeiSeatForm
              tableId={modal.tableId}
              prefill={modal.fromReserve && shimei[modal.tableId]?.reserved ? shimei[modal.tableId].memo : null}
              hosts={activeHosts}
              pickerHosts={pickerHosts}
              seatMap={seatMap}
              hostById={hostById}
              onSubmit={(seats) => seatShimei(modal.tableId, seats)}
              onReserve={(memo) => reserveShimei(modal.tableId, memo)}
            />
          )}
          {modal.type === "reserveForm" && (
            <ShimeiReserveForm
              tableId={modal.tableId}
              hosts={activeHosts}
              hostById={hostById}
              initial={shimei[modal.tableId]?.reserved ? shimei[modal.tableId].memo : null}
              onSubmit={(memo) => reserveShimei(modal.tableId, memo)}
            />
          )}
          {modal.type === "reserveDetail" && shimei[modal.tableId]?.reserved && (
            <ShimeiReserveDetail
              tableId={modal.tableId}
              memo={shimei[modal.tableId].memo}
              hostById={hostById}
              readOnly={readOnly}
              onEdit={() => setModal({ type: "reserveForm", tableId: modal.tableId })}
              onSeat={() => reserveToSeat(modal.tableId)}
              onCancel={() => cancelReserve(modal.tableId)}
            />
          )}
          {modal.type === "shimeiAdd" && shimei[modal.tableId] && (
            <ShimeiSeatForm
              tableId={modal.tableId}
              title="に組を追加"
              existingCount={shimei[modal.tableId].seats.length}
              hosts={activeHosts}
              pickerHosts={pickerHosts}
              seatMap={seatMap}
              hostById={hostById}
              onSubmit={(seats) => addShimeiSeats(modal.tableId, seats)}
            />
          )}
          {modal.type === "shimeiDetail" && shimei[modal.tableId] && !shimei[modal.tableId].reserved && (
            <ShimeiDetail
              tableId={modal.tableId}
              ses={shimei[modal.tableId]}
              hostById={hostById}
              now={now}
              readOnly={readOnly}
              onMove={() => setModal({ type: "shimeiMove", tableId: modal.tableId })}
              onAdd={() => setModal({ type: "shimeiAdd", tableId: modal.tableId })}
              onChangeKind={(idx, kind) => setSeatKind(modal.tableId, idx, kind)}
              onEditHime={(idx, himeName) => setSeatHime(modal.tableId, idx, himeName)}
              onEnd={() => endShimei(modal.tableId)}
            />
          )}
          {modal.type === "shimeiMove" && shimei[modal.tableId] && (
            <ShimeiMoveForm
              tableId={modal.tableId}
              freeTables={tableIds.filter((t) => !sessions[t] && !shimei[t])}
              onSubmit={(toId) => moveShimei(modal.tableId, toId)}
            />
          )}
          {modal.type === "okuri" && sessions[modal.tableId] && (
            <OkuriForm
              tableId={modal.tableId}
              ses={sessions[modal.tableId]}
              hosts={hosts}
              hostById={hostById}
              onSubmit={(okuriIds) => decideOkuri(modal.tableId, okuriIds)}
            />
          )}
          {modal.type === "nominaoshi" && sessions[modal.tableId] && sessions[modal.tableId].okuriDecided && (
            <NominaoshiForm
              tableId={modal.tableId}
              ses={sessions[modal.tableId]}
              hostById={hostById}
              freeTables={tableIds.filter((t) => t !== modal.tableId && !sessions[t] && !shimei[t])}
              onSubmit={(toId, seats) => nominaoshi(modal.tableId, toId, seats)}
            />
          )}
        </Sheet>
      )}
    </div>
  );
}

// ─── 着席フォーム ───────────────────────────────────
const emptyGirl = (pos) => ({ pos, name: "", yobiIds: [] });

const SeatForm = ({ tableId, defaultMins, clampMin, hosts, pickerHosts, seatMap, onSubmit }) => {
  const [size, setSizeRaw] = useState(1);
  const [girls, setGirls] = useState([emptyGirl("")]);
  const [hostIds, setHostIds] = useState([]);
  const [rotateMin, setRotateMin] = useState(clampMin(defaultMins[1]));
  const [touched, setTouched] = useState(false);

  const setSize = (n) => {
    setSizeRaw(n);
    const labels = posLabels(n);
    setGirls((prev) => labels.map((pos, i) => (prev[i] ? { ...prev[i], pos } : emptyGirl(pos))));
    setHostIds((ids) => ids.slice(0, n));
    if (!touched) setRotateMin(clampMin(defaultMins[n]));
  };

  const updateGirl = (i, patch) =>
    setGirls((prev) => prev.map((g, j) => (j === i ? { ...g, ...patch } : g)));

  const toggleYobi = (i, id) =>
    updateGirl(i, {
      yobiIds: girls[i].yobiIds.includes(id)
        ? girls[i].yobiIds.filter((x) => x !== id)
        : [...girls[i].yobiIds, id],
    });

  const toggleHost = (id) =>
    setHostIds((ids) => (ids.includes(id) ? ids.filter((x) => x !== id) : [...ids, id]));

  const tags = yobiTagsOf(girls);
  const conflicts = yobiConflicts(hostIds, girls);
  const ready = hostIds.length === 0 || hostIds.length === size;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 16 }}>
        <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 26, fontWeight: 600, color: C.goldBright }}>
          {tableId}
        </span>
        <span style={{ fontSize: 14, fontWeight: 700 }}>に着席</span>
      </div>

      <Field label="お客様の人数">
        <div style={{ display: "flex", gap: 8 }}>
          {[1, 2, 3].map((n) => (
            <button
              key={n}
              onClick={() => setSize(n)}
              style={{
                flex: 1, padding: "12px 0", borderRadius: 8, fontSize: 14, fontWeight: 700,
                fontFamily: "'Zen Kaku Gothic New', sans-serif", cursor: "pointer",
                background: size === n ? `${C.cyan}1A` : "transparent",
                color: size === n ? C.cyan : C.muted,
                border: `1px solid ${size === n ? C.cyan : C.line}`,
              }}
            >
              初回{n}名
            </button>
          ))}
        </div>
      </Field>

      {girls.map((g, i) => (
        <div
          key={i}
          style={{
            border: `1px solid ${C.line}`, borderRadius: 10,
            padding: "12px", marginBottom: 10, background: `${C.surface2}66`,
          }}
        >
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <PosBadge pos={g.pos || "1人"} />
            <span style={{ fontSize: 13, fontWeight: 700 }}>{g.pos ? `${g.pos}の女の子` : "お客様"}</span>
          </div>

          <Field
            label={`呼び・写真指名（なし〜2人）${g.yobiIds.length > 0 ? ` — ${g.yobiIds.length}人` : ""}`}
            style={{ marginBottom: 0 }}
          >
            <HostChips
              list={hosts}
              selected={g.yobiIds}
              onToggle={(id) => toggleYobi(i, id)}
              max={2}
              accent={posColor(g.pos || "")}
              disabledIds={girls.flatMap((g2, j2) => (j2 === i ? [] : g2.yobiIds))}
            />
          </Field>
        </div>
      ))}

      <Field label={`付けるホスト（${hostIds.length}/${size}人・後から付けてもOK）— 卓名付きは他卓から連れてくる`}>
        <HostChips
          list={pickerHosts}
          selected={hostIds}
          onToggle={toggleHost}
          max={size}
          tags={tags}
          disabledIds={conflicts}
          notes={seatMap}
        />
        <div style={{ fontSize: 11, color: C.muted, marginTop: 6 }}>
          呼び（写真指名）だけ先に決めて、ホストは空欄のまま着席もできます。その場合は卓が無人アラートになり、あとで「次のキャストに回す」で付けられます。
        </div>
      </Field>

      <Field label="この卓の回転時間">
        <select
          value={rotateMin}
          onChange={(e) => { setRotateMin(Number(e.target.value)); setTouched(true); }}
          style={inputStyle}
        >
          {MIN_OPTIONS.map((m) => (
            <option key={m} value={m}>{fmtMin(m)}</option>
          ))}
        </select>
      </Field>

      <Btn
        kind="gold"
        disabled={!ready}
        onClick={() =>
          onSubmit({
            girls: girls.map((g) => ({ ...g, name: "" })),

            rotateMin,
          })
        }
        style={{ width: "100%", padding: 14, fontSize: 15 }}
      >
        {hostIds.length === 0 ? "呼びのみで着席（あとでホストを付ける）" : `着席（${hostIds.length}/${size}人付ける）`}
      </Btn>
    </div>
  );
};

// ─── 卓詳細シート ───────────────────────────────────

      {!okuriDecided && ses.girls.map((g, i) => {

                    {k > 0 ? "・" : ""}{nameOf(id)}

                ))}
                <span style={{ fontSize: 9, color: C.muted, marginLeft: 4 }}>線=着席済</span>
              </span>
            )}
          </div>

      {!okuriDecided && (<>
      <div style={{ fontSize: 11, color: C.muted, letterSpacing: "0.12em", margin: "12px 0 7px" }}>着席中のホスト</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>

                <span key={id} style={{ color: C.goldBright }}>

              reserved[1].map((id, k) => (
                <span key={id} style={{ color: C.goldBright }}>
                  {k > 0 && "・"}{tags[id] && <YobiMark poses={tags[id]} />}{nameOf(id)}
                </span>
              ))

              <span style={{ color: C.muted }}>未定</span>
            )}
          </div>
        </div>
        {!readOnly && (

      <div style={{ fontSize: 11, color: C.text, lineHeight: 1.8 }}>

      {okuriDecided ? (

          <div style={{ textAlign: "right", marginBottom: 12 }}>
            <button onClick={onUndoOkuri} style={{ background: "none", border: "none", color: C.muted, fontSize: 11, textDecoration: "underline", cursor: "pointer", fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>
              送りをやり直す（初回に戻す）
            </button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Btn kind="danger" onClick={onPay} style={{ width: "100%", padding: 14, fontSize: 15 }}>会計して卓を空ける</Btn>
            <Btn kind="gold" disabled={ses.okuriDecided.filter(Boolean).length === 0} onClick={onNominaoshi} style={{ width: "100%", padding: 14, fontSize: 15 }}>飲み直し（指名へ切替）</Btn>

              <div style={{ fontSize: 11, color: C.muted, textAlign: "center" }}>飲み直しには送り指名が必要です</div>

        <>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", margin: "14px 0 16px" }}>
            <span style={{ fontSize: 13, fontWeight: 700 }}>この卓の回転時間</span>
            <select value={clampMin(ses.rotateMin)} onChange={(e) => setTableRotateMin(tableId, Number(e.target.value))} style={selectStyle}>
              {MIN_OPTIONS.map((m) => (<option key={m} value={m}>{fmtMin(m)}</option>))}
            </select>
          </div>
          )}

          {empty && (
            <div style={{ border: `1px solid ${C.red}66`, background: `${C.red}12`, borderRadius: 8, padding: "8px 12px", marginBottom: 10, fontSize: 12, fontWeight: 700, color: C.red }}>
              誰も着いていません（無人 {fmt(now - (ses.emptySince || ses.seatedAt))}）— 「回す」で新しく付けられます

          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>

// ─── 予定フォーム（過去にこの卓に着いたホストは選択不可） ─
const ReserveForm = ({ tableId, ses, hosts, seatMap, hostById, onSubmit }) => {
  const reserved = ses.reserved || [];
  const [next1, setNext1] = useState(reserved[0] || []);
  const [next2, setNext2] = useState(reserved[1] || []);
  const nameOf = (id) => hostById(id)?.name || "—";
  const n = ses.girls.length;
  const tags = yobiTagsOf(ses.girls);
  // この卓に一度でも着いたホストは予定不可
  const visitedIds = [...new Set(ses.history.flatMap((t) => t.hostIds))];
  const notes = {};
  hosts.forEach((h) => {
    if (visitedIds.includes(h.id)) notes[h.id] = "済";
    else if (seatMap[h.id]) notes[h.id] = seatMap[h.id];
  });

  const mk = (sel, set) => (id) =>
    set(sel.includes(id) ? sel.filter((x) => x !== id) : [...sel, id]);

  const slots = [
    { label: "次に付ける（メモ）", sel: next1, other: next2, toggle: mk(next1, setNext1), clear: () => setNext1([]) },
    { label: "その次に付ける（メモ）", sel: next2, other: next1, toggle: mk(next2, setNext2), clear: () => setNext2([]) },
  ];

  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 10 }}>
        <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 26, fontWeight: 600, color: C.goldBright }}>
          {tableId}
        </span>
        <span style={{ fontSize: 14, fontWeight: 700 }}>の予定メモ</span>
      </div>

      <div style={{ fontSize: 12, color: C.muted, marginBottom: 14 }}>
        他の卓に着席中のホストも選べます。すでにこの卓に着いたことがあるホストは選べません。回す時にワンタップで反映でき、その場で変更もできます。
      </div>

      {slots.map((slot, i) => (
        <div
          key={i}
          style={{
            border: `1px solid ${C.line}`, borderRadius: 10,
            padding: "12px", marginBottom: 10, background: `${C.surface2}66`,
          }}
        >
          <div style={{ display: "flex", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontSize: 12, fontWeight: 700 }}>{slot.label}</span>
            <span style={{ fontSize: 11, color: C.muted, marginLeft: 8 }}>{slot.sel.length}/{n}人</span>
            {slot.sel.length > 0 && (
              <button
                onClick={slot.clear}
                style={{
                  marginLeft: "auto", background: "none", border: "none",
                  color: C.muted, fontSize: 11, cursor: "pointer", textDecoration: "underline",
                }}
              >
                クリア
              </button>
            )}
          </div>
          <HostChips
            list={hosts}
            selected={slot.sel}
            onToggle={slot.toggle}
            max={n}
            tags={tags}
            disabledIds={[...new Set([...yobiConflicts(slot.sel, ses.girls), ...visitedIds, ...slot.other])]}
            notes={notes}
          />
        </div>
      ))}

      <Btn
        kind="gold"
        onClick={() => onSubmit([next1, next2])}
        style={{ width: "100%", padding: 14, fontSize: 15 }}
      >
        メモを保存
      </Btn>
    </div>
  );
};

// ─── 回すフォーム ───────────────────────────────────
const RotateForm = ({ tableId, ses, pickerHosts, seatMap, hostById, onSubmit }) => {
  const nameOf = (id) => hostById(id)?.name || "—";
  const n = ses.girls.length;
  const tags = yobiTagsOf(ses.girls);
  const next = (ses.reserved || [])[0] || [];
  const visitedIds = [...new Set(ses.history.flatMap((t) => t.hostIds))];
  // この卓に着席済のホストだけ選択不可。他卓に着席中は選択OK（引き抜き＝入れ替え用）
  const baseDisabled = pickerHosts.filter((h) => visitedIds.includes(h.id)).map((h) => h.id);
  const notes = {};
  pickerHosts.forEach((h) => {
    if (visitedIds.includes(h.id)) notes[h.id] = "済";
    else if (seatMap[h.id] && seatMap[h.id] !== tableId) notes[h.id] = seatMap[h.id];
  });
  const unavailable = next.filter((id) => visitedIds.includes(id));

  const [picks, setPicks] = useState([]);
  const conflicts = yobiConflicts(picks, ses.girls);
  const applyReserve = () => setPicks(next.filter((id) => !visitedIds.includes(id)).slice(0, n));

  const toggle = (id) =>
    setPicks((ids) => (ids.includes(id) ? ids.filter((x) => x !== id) : [...ids, id]));

  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 10 }}>
        <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 26, fontWeight: 600, color: C.goldBright }}>
          {tableId}
        </span>
        <span style={{ fontSize: 14, fontWeight: 700 }}>を回す（⟳{ses.history.length + 1}ターン目へ）</span>
      </div>

      {ses.hostIds.length > 0 && (
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>
          抜ける：{ses.hostIds.map(nameOf).join("・")}（全員同時に待機へ）
        </div>
      )}
      <div style={{ fontSize: 10, color: C.muted, marginBottom: 12 }}>
        着いた順：{ses.history.map((t, j) => `${j + 1}.${t.hostIds.map(nameOf).join("・")}`).join(" → ")}
      </div>

      {next.length > 0 && (
        <div
          style={{
            border: `1px solid ${C.gold}55`, background: `${C.gold}0D`, borderRadius: 10,
            padding: "10px 12px", marginBottom: 12,
            display: "flex", alignItems: "center", gap: 10,
          }}
        >
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 11, fontWeight: 700 }}>
              <span style={{ color: C.muted }}>予定メモ▸ </span>
              <span style={{ color: C.goldBright }}>{next.map(nameOf).join("・")}</span>
            </div>
            {unavailable.length > 0 && (
              <div style={{ fontSize: 10, color: C.red, marginTop: 2 }}>
                ※{unavailable.map(nameOf).join("・")}はこの卓に着席済のため反映されません
              </div>
            )}
          </div>
          <Btn kind="gold" onClick={applyReserve} style={{ padding: "8px 12px", fontSize: 12, flexShrink: 0 }}>
            反映
          </Btn>
        </div>
      )}

      <div style={{ display: "flex", flexWrap: "wrap", gap: "4px 14px", marginBottom: 12, alignItems: "center" }}>
        {ses.girls.some((g) => (g.yobiIds || []).length > 0) && (
          <span style={{ fontSize: 10, color: C.muted, fontWeight: 700 }}>呼び</span>
        )}
        {ses.girls.map((g, i) => {
          const ys = (g.yobiIds || []).filter((id) => nameOf(id) !== "—");
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <PosBadge pos={g.pos} small />
              <span style={{ fontSize: 11, color: C.cyan, fontWeight: 700 }}>{g.name || "お客様"}</span>
              {ys.length > 0 && (
                <span style={{ fontSize: 10, color: posColor(g.pos || "") }}>
                  {ys.map((id, k) => (
                    <span
                      key={id}
                      style={{
                        textDecoration: visitedIds.includes(id) ? "line-through" : "none",
                        opacity: visitedIds.includes(id) ? 0.55 : 1,
                      }}
                    >
                      {k > 0 ? "・" : ""}{nameOf(id)}
                    </span>
                  ))}
                </span>
              )}
            </div>
          );
        })}
      </div>

      <Field label={`次に付けるホスト（${picks.length}/${n}人を同時に選択）— 卓名付きは他卓から引き抜き（元の卓は全員待機に戻り無人表示）。済は選べません`}>
        <HostChips
          list={pickerHosts}
          selected={picks}
          onToggle={toggle}
          max={n}
          tags={tags}
          disabledIds={[...conflicts, ...baseDisabled]}
          notes={notes}
        />
      </Field>

      <Btn
        kind="gold"
        disabled={picks.length !== n}
        onClick={() => onSubmit(picks)}
        style={{ width: "100%", padding: 14, fontSize: 15 }}
      >
        回す（{picks.length}/{n}人付ける）
      </Btn>
    </div>
  );
};

// ─── 会計フォーム ───────────────────────────────────
// 区分セレクタ（allowで対象を限定）

  <div style={{ display: "flex", gap: 8 }}>
    {Object.entries(KINDS).filter(([id]) => !allow || allow.includes(id)).map(([id, k]) => (
      <button
        key={id}
        onClick={() => onChange(id)}
        style={{
          flex: 1, padding: "10px 0", borderRadius: 8, fontSize: 13, fontWeight: 700,
          fontFamily: "'Zen Kaku Gothic New', sans-serif", cursor: "pointer",

// ─── 予約：作成・編集フォーム（担当・名前は任意） ─
const ShimeiReserveForm = ({ tableId, hosts, hostById, initial, onSubmit }) => {
  const [name, setName] = useState(initial?.name || "");
  const [hostId, setHostId] = useState(initial?.hostId || null);

// ─── 指名：着席フォーム（担当＋姫＋区分。最大4組・グレーアウトなし） ─
const ShimeiSeatForm = ({ tableId, title, existingCount, prefill, hosts, pickerHosts, seatMap, hostById, onSubmit, onReserve }) => {
  const nameOf = (id) => hostById(id)?.name || "—";
  const [rows, setRows] = useState([{ hostId: prefill?.hostId || null, himeName: prefill?.name || "", kind: "set" }]);
  const [taiten, setTaiten] = useState(false);
  const max = 4 - (existingCount || 0);

  const setRow = (i, patch) => setRows((rs) => rs.map((r, j) => (j === i ? { ...r, ...patch } : r)));
  const addRow = () => rows.length < max && setRows((rs) => [...rs, { hostId: null, himeName: "", kind: "set" }]);
  const removeRow = (i) => setRows((rs) => rs.filter((_, j) => j !== i));

  const chosen = rows.map((r) => r.hostId).filter(Boolean);
  const ready = taiten || (rows.every((r) => r.hostId) && new Set(chosen).size === chosen.length);
  const submit = () => {
    if (taiten) {
      onSubmit([{ hostId: null, himeName: "", kind: "taiten" }]);
    } else {
      onSubmit(rows.map((r) => ({ ...r, himeName: r.himeName.trim() })));
    }
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 6 }}>
        <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 26, fontWeight: 600, color: C.goldBright }}>{tableId}</span>
        <span style={{ fontSize: 14, fontWeight: 700 }}>{title || "に指名で着席"}</span>
      </div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 14 }}>
        担当ホストと姫、区分を組ごとに設定します（最大4組）。体験入店の場合は下のトグルをON。
      </div>

      {/* 体入トグル */}
      {!title && (
        <button
          onClick={() => setTaiten((v) => !v)}
          style={{
            width: "100%", marginBottom: 14, borderRadius: 10, cursor: "pointer",
            padding: "12px", fontFamily: "'Zen Kaku Gothic New', sans-serif",
            fontSize: 13, fontWeight: 700,
            background: taiten ? `${KINDS.taiten.color}22` : "transparent",
            color: taiten ? KINDS.taiten.color : C.muted,
            border: `1px solid ${taiten ? KINDS.taiten.color : C.line}`,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
          }}
        >
          <span style={{
            width: 16, height: 16, borderRadius: 4, flexShrink: 0,
            border: `2px solid ${taiten ? KINDS.taiten.color : C.muted}`,
            background: taiten ? KINDS.taiten.color : "transparent",
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            color: "#0B0A12", fontSize: 11,
          }}>{taiten ? "✓" : ""}</span>
          体験入店で卓を使う（担当・区分なし・時間はカウントアップ）
        </button>
      )}

      <div style={{ opacity: taiten ? 0.35 : 1, pointerEvents: taiten ? "none" : "auto" }}>
      {rows.map((r, i) => (
        <div key={i} style={{ border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px", marginBottom: 10, background: `${C.surface2}66` }}>
          <div style={{ display: "flex", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.pink }}>{i + 1}組目</span>
            {rows.length > 1 && (
              <button onClick={() => removeRow(i)} style={{ marginLeft: "auto", background: "none", border: "none", color: C.muted, fontSize: 12, cursor: "pointer", textDecoration: "underline", fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>削除</button>
            )}
          </div>

          <Field label="区分">
            <KindPicker value={r.kind} onChange={(k) => setRow(i, { kind: k })} allow={["set","quick","peer"]} />
          </Field>

          <Field label="姫の名前（任意）">
            <input value={r.himeName} onChange={(e) => setRow(i, { himeName: e.target.value })} placeholder="登録名" style={inputStyle} />
          </Field>

          <Field label="担当ホスト（1人）" style={{ marginBottom: 0 }}>
            <HostChips
              list={hosts}
              selected={r.hostId ? [r.hostId] : []}
              onToggle={(id) => setRow(i, { hostId: r.hostId === id ? null : id })}
              max={1}
            />
          </Field>
        </div>
      ))}

      {rows.length < max && (
        <Btn onClick={addRow} style={{ width: "100%", marginBottom: 12 }}>＋ 組を追加</Btn>
      )}
      </div>

      {title ? (
        <Btn kind="gold" disabled={!ready} onClick={submit} style={{ width: "100%", padding: 14, fontSize: 15 }}>
          追加する（{chosen.length}組）
        </Btn>
      ) : taiten ? (
        <Btn kind="gold" onClick={submit} style={{ width: "100%", padding: 14, fontSize: 15 }}>
          体入で卓を使う
        </Btn>
      ) : (
        <div style={{ display: "flex", gap: 8 }}>
          <Btn kind="gold" disabled={!ready} onClick={submit} style={{ flex: 2, padding: 14, fontSize: 15 }}>
            指名で着席（{chosen.length}組）
          </Btn>
          <Btn onClick={() => onReserve({ hostId: rows[0]?.hostId || null, name: (rows[0]?.himeName || "").trim() })} style={{ flex: 1, padding: 14, fontSize: 14 }}>
            予約にする
          </Btn>
        </div>
      )}
    </div>
  );
};

// ─── 指名：卓詳細 ───

                )}

                <span style={{ marginLeft: "auto", display: "flex", alignItems: "baseline", gap: 6 }}>
                  <span style={{ fontFamily: "Oswald, sans-serif", fontSize: 11, color: C.muted }}>{fmtTime(se.startedAt)}〜</span>
                  {(info.countup || k.limitMin) && <span style={{ fontSize: 15, fontWeight: 700, color: info.alert ? C.red : C.goldBright }}>{info.text}</span>}

              </div>

                <div style={{ marginTop: 8 }}>
                  {kindEdit === i ? (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>

                        value={se.kind}
                        onChange={(nk) => { onChangeKind(i, nk); setKindEdit(null); }}

                      <button onClick={() => setKindEdit(null)} style={{ background: "none", border: "none", color: C.muted, fontSize: 11, cursor: "pointer", textDecoration: "underline", fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>閉じる</button>
                    </div>

                    <button onClick={() => setKindEdit(i)} style={{ background: "none", border: `1px solid ${C.line}`, borderRadius: 6, color: C.muted, fontSize: 11, fontWeight: 700, padding: "4px 10px", cursor: "pointer", fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>区分を変更</button>

            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>

              <Btn kind="danger" onClick={() => setConfirmEnd(true)} style={{ width: "100%", flex: 1 }}>{isTaiten ? "体入終了" : "会計"}</Btn>
            )}
          </div>
        </>
      )}

  );
};

        <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "20px 0" }}>空き卓がありません</div>

                  <button key={t} onClick={() => onSubmit(t)} style={{ background: `${C.gold}12`, border: `1px solid ${C.gold}66`, borderRadius: 8, padding: "10px 16px", cursor: "pointer", color: C.goldBright, fontFamily: "Oswald, sans-serif", fontSize: 14, fontWeight: 600 }}>{t}</button>

// ─── 送り選択フォーム（送りだけ決める） ───

  const [okuri, setOkuri] = useState(ses.okuriDecided || ses.girls.map(() => null));
  const nameOf = (id) => hostById(id)?.name || "—";
  const visitedIds = [...new Set(ses.history.flatMap((t) => t.hostIds))];
  const pick = (i, id) => setOkuri((p) => p.map((v, j) => (j === i ? (v === id ? null : id) : v)));

  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 12 }}>

        送りを決定（カウントアップ開始）
      </Btn>
    </div>
  );
};

      ))}

      <Btn kind="gold" onClick={() => onSubmit(toTable, rows.map((r) => ({ ...r, himeName: r.himeName.trim() })))} style={{ width: "100%", padding: 14, fontSize: 15 }}>
        飲み直しで指名へ（{rows.length}組）
      </Btn>
    </div>
  );
};


ReactDOM.createRoot(document.getElementById("root")).render(<TsukemawashiBoard />);

</script>
</body>
</html>
